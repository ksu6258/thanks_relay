<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 대성에너지 감사 릴레이 캠페인</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts - Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #fcfcf9;
    }
    /* 하트 둥둥 떠오르는 애니메이션 */
    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-80px) scale(1.4);
        opacity: 0;
      }
    }
    .floating-heart {
      position: absolute;
      animation: floatUp 0.8s ease-out forwards;
      pointer-events: none;
    }
    /* 고급스러운 입체림 그림자 */
    .soft-shadow {
      box-shadow: 0 12px 35px -6px rgba(220, 140, 90, 0.08), 0 5px 15px -3px rgba(0, 0, 0, 0.02);
    }
    
    /* [화질 개선의 핵심] 인물 사진 전용 고화질 스무딩 및 안티앨리어싱 필터 */
    .premium-profile-img {
      object-fit: cover;
      image-rendering: high-quality;      /* 브라우저 최고 화질 렌더링 강제 활성화 */
      backface-visibility: hidden;        /* 미세한 선 깨짐 방지 */
      transform: translateZ(0);           /* GPU 물리 가속으로 윤곽선 부드럽게 보정 */
    }
  </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-20">

  <!-- TOP HEADER (Hero Section) -->
  <header class="relative overflow-hidden bg-gradient-to-b from-amber-50 via-rose-50 to-[#fcfcf9] pt-16 pb-12 px-4 text-center">
    <!-- 배경 장식 데코 -->
    <div class="absolute top-10 left-10 w-24 h-24 bg-red-100 rounded-full blur-2xl opacity-60"></div>
    <div class="absolute bottom-5 right-10 w-32 h-32 bg-amber-100 rounded-full blur-2xl opacity-60"></div>
    
    <div class="max-w-4xl mx-auto relative z-10">
      <!-- 캠페인 배지 -->
      <span class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-semibold bg-rose-100 text-rose-600 mb-4 animate-bounce">
        <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
        대성에너지 사내 온기 나누기 프로젝트
      </span>
      
      <!-- 메인 타이틀 -->
      <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-slate-900 tracking-tight leading-tight">
        일상 속 <span class="text-rose-500 relative">감사 한마디<span class="absolute left-0 bottom-1 w-full h-2.5 bg-rose-100 -z-10"></span></span>, 함께 나누어요!
      </h1>
      <p class="mt-4 text-base md:text-lg text-slate-600 font-medium max-w-2xl mx-auto leading-relaxed">
        '건강과 쉼이 함께하는 행복한 일터'를 만드는 **2026 감사 릴레이** 5월의 메시지가 도착했습니다. 따뜻한 마음을 열어 확인해 보세요. 🎁
      </p>
    </div>
  </header>

  <!-- MAIN CONTENT AREA -->
  <main class="max-w-4xl mx-auto px-4 mt-4">

    <!-- 필터 및 검색 바 -->
    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col md:flex-row gap-3 items-center justify-between mb-8">
      <!-- 탭 컨트롤러 -->
      <div class="flex p-1 bg-slate-50 rounded-xl w-full md:w-auto">
        <button onclick="filterWeek('all')" id="tab-all" class="flex-1 md:flex-none px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 bg-white text-rose-600 shadow-sm">
          전체 보기
        </button>
        <button onclick="filterWeek(1)" id="tab-1" class="flex-1 md:flex-none px-4 py-2 rounded-lg text-sm font-medium text-slate-500 hover:text-slate-800 transition-all duration-200">
          1주차 (5/11)
        </button>
        <button onclick="filterWeek(2)" id="tab-2" class="flex-1 md:flex-none px-4 py-2 rounded-lg text-sm font-medium text-slate-500 hover:text-slate-800 transition-all duration-200">
          2주차 (5/18)
        </button>
      </div>
      
      <!-- 검색 인풋 -->
      <div class="relative w-full md:w-64">
        <input 
          type="text" 
          id="search-input" 
          oninput="handleSearch()"
          placeholder="이름, 부서, 키워드 검색..." 
          class="w-full pl-9 pr-4 py-2 text-sm bg-slate-50 hover:bg-slate-100 focus:bg-white border border-transparent focus:border-rose-300 rounded-xl focus:outline-none transition-all"
        >
        <svg class="w-4 h-4 text-slate-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
    </div>

    <!-- 감사 메시지 카드 리스트 -->
    <section id="messages-container" class="space-y-6">
      <!-- 카드는 JS를 통해 동적 생성됩니다 -->
    </section>

    <!-- 검색 결과가 없을 때의 UI -->
    <div id="no-results" class="hidden text-center py-16 bg-white rounded-3xl border border-dashed border-slate-200">
      <span class="text-4xl">🔍</span>
      <p class="mt-4 text-slate-500 font-medium">검색 결과에 맞는 감사 메시지가 없습니다.</p>
      <p class="text-xs text-slate-400 mt-1">다른 키워드나 팀 이름으로 검색해 보세요!</p>
    </div>

  </main>

  <footer class="mt-20 text-center text-xs text-slate-400">
    <p>© 2026 대성에너지 경영지원본부 HR팀. All rights reserved.</p>
    <p class="mt-1">여러분의 따뜻한 한마디가 소중하고 긍정적인 직장 소통 문화를 만들어 나갑니다.</p>
  </footer>

  <!-- JavaScript logic -->
  <script>
    // 1. 감사 데이터 로드 및 초기 설정
    const initialMessages = [
      {
        id: 1,
        week: 1,
        date: "5월 11일",
        badge: "언제나 밝은 미소로 함께해 주시는 든든한 동료",
        targetName: "최도현 대리님",
        targetDept: "경영정보팀",
        sender: "당신의 영원한 응원군, 익명의 동료로부터",
        baseName: "최도현 대리",
        initialImg: "최도현 대리.jpeg",
        content: "최도현 대리님께,<br><br>시스템 고도화 작업으로 한창 바쁘신 와중에도 늘 밝은 미소로 함께해주셔서 감사합니다. 2025년부터 이어진 긴 여정 동안, 여러 계열사의 목소리를 하나로 모으는 과정이 결코 쉽지 않았을 텐데 대리님이 계셔서 든든했습니다.<br><br>기술적인 간간을 메우기 위해 적극적으로 합의점을 찾아주시고, 팀의 어려움까지 세심하게 살펴주신 덕분에 큰 도움을 받았습니다. 쉽지 않은 상황에서도 중심을 잃지 않고 프로페셔널한 매너로 업무를 대하시는 모습은 동료로서 참 본받고 싶습니다.<br><br>'항상 웃으며 업무에 임하는' 대리님에 대한 좋은 기억을 제게 남겨주셔서 감사해요. 앞으로 남은 과정도 대리님과 함께라면 기분 좋게 마무리할 수 있을 것 같습니다. 늘 응원하겠습니다! 🦾",
        likes: 24,
        tags: ["시스템 고도화", "미소 천사", "협업 시너지"]
      },
      {
        id: 2,
        week: 1,
        date: "5월 11일",
        badge: "보이지 않는 곳에서 모두를 위해 애써주시는 우리들의 가교",
        targetName: "안민기 과장님",
        targetDept: "경산안전팀",
        sender: "감사를 전하고 싶은 든든한 동료로부터",
        baseName: "안민기 과장",
        initialImg: "안민기 과장.jpeg",
        content: "안민기 과장님께,<br><br>안민기 과장께서는 노사협의나 산보위의 공식적인 위치에 계신 것은 아니지만, 언제나 동료들의 목소리에 귀 기울이고 고충을 세심하게 수렴하여 회사에 잘 전달해 주시는 든든한 가교 역할을 해주셨습니다.<br><br>경산안전팀의 동료들을 위해 보여주신 따뜻한 배려와 책임감 있는 태도는 모두에게 큰 힘이 되었고, 조직이 더 건강하고 신뢰받는 방향으로 나아가는 데 중요한 밑거름이 되었습니다. 늘 감사드립니다. 🍀",
        likes: 18,
        tags: ["소통의 가교", "경산안전팀", "따뜻한 배려"]
      },
      {
        id: 3,
        week: 2,
        date: "5월 18일",
        badge: "전문적인 지식은 물론, 따뜻한 일상까지 함께 나누는 헬스 코치",
        targetName: "정재훈 대리님",
        targetDept: "HR팀",
        sender: "건강한 내일을 함께 그리는 헬스 파트너 동료로부터",
        baseName: "정재훈 대리",
        initialImg: "정재훈 대리.jpg",
        content: "정재훈 대리님께,<br><br>회사 동료들의 업무적인 측면에서도 평소 많은 도움을 주시고, 개인적으로는 헬스 트레이닝으로 많은 도움을 받아 이렇게 감사 인사를 드립니다.<br><br>어렵고 복잡한 인사 업무 속에서 많이 바쁘실 텐데, 회사 직원분들이 업무적으로 많은 문의를 드려도 전문적인 지식과 성실함을 바탕으로 문제들을 잘 해결해 주시는 것이 같은 회사 직원으로서 참 든든한 것 같습니다. HR팀과 업무 협의를 할 때는 회사의 발전을 위해 고민하시고 제도 및 업무 방식의 발전을 먼저 많이 고민해 주셔서 감사했습니다.<br><br>개인적으로는 헬스를 잘 모를 때 퇴근 후 시간을 내서 알려주시고, 함께 닭갈비 철판볶음밥을 먹으며 단백질 섭취도 했던 것이 기억에 남습니다. 저 말고도 헬스 동호회 내에서도 다른 직원분들의 건강 증진을 위해서 헬스 코치(?)로 많이 도와주셔서 감사드립니다.<br><br>바쁜 회사 업무 속에 계시지만 커피 한 잔의 여유도 가지시면서 재훈 대리님 본인 건강도 잘 챙겨가며 일하시기를 바라며, 앞으로도 회사 업무 잘 해나가시기를 응원드립니다. 감사합니다. ☕",
        likes: 31,
        tags: ["인사 히어로", "체력 코치", "닭갈비 메이트"]
      },
      {
        id: 4,
        week: 2,
        date: "5월 18일",
        badge: "17년 전 힘든 시기, 제 손을 잡아주었던 따뜻한 배려",
        targetName: "김영헌 과장님",
        targetDept: "공급기획팀",
        sender: "오랜 시간 동안 깊은 고마움을 간직해 온 동료로부터",
        baseName: "김영헌 과장",
        initialImg: "김영헌 과장.jpeg",
        content: "김영헌 과장님, 안녕하세요.<br><br>지난 17년 전 중부지사에서 처음 함께 근무하던 시기에, 개인적인 가정사로 인해 업무에 집중하지 못하고 힘든 시간을 보낸 적이 있었습니다. 그때 과장님께서 제 입장을 이해해 주시고 배려해 주신 덕분에 수검업무도 큰 문제 없이 잘 마무리할 수 있었습니다.<br><br>당시 과장님의 따뜻한 배려와 공감은 지금까지도 제 마음에 깊이 남아 있습니다. 상대방을 이해하고 먼저 배려하는 과장님 같은 동료가 있기에 회사도 더 좋은 방향으로 발전한다고 생각합니다.<br><br>오랜 시간이 지나도 잊지 못할 도움에 다시 한번 감사드리며, 앞으로도 늘 건강하시고 좋은 일만 가득하시길 바랍니다. 감사합니다. 💐",
        likes: 42,
        tags: ["17년 우정", "따뜻한 배려", "평생의 고마움"]
      }
    ];

    let messages = [];
    let activeTab = 'all';
    let searchQuery = '';

    // 로컬 스토리지 또는 초기 배열 설정
    function initData() {
      const saved = localStorage.getItem('daesung_thanks_campaign_likes');
      if (saved) {
        const parsedLikes = JSON.parse(saved);
        messages = initialMessages.map(m => ({
          ...m,
          likes: parsedLikes[m.id] !== undefined ? parsedLikes[m.id] : m.likes
        }));
      } else {
        messages = [...initialMessages];
      }
    }

    // [고도화된 복합 자동 이미지 매칭 엔진]
    function handleImageRetry(img, baseName, retryIndex = 0) {
      // 띄어쓰기가 있는 원본과 띄어쓰기를 완전히 제거한 압축 형태 후보군을 모두 준비합니다.
      const nameVariants = [
        baseName,                      // 1. "정재훈 대리"
        baseName.replace(/\s+/g, '')   // 2. "정재훈대리"
      ];
      
      const extensions = ['.jpg', '.jpeg', '.png', '.JPG', '.JPEG', '.PNG', '.gif'];
      const totalCombinations = nameVariants.length * extensions.length;
      
      if (retryIndex < totalCombinations) {
        const variantIndex = Math.floor(retryIndex / extensions.length);
        const extIndex = retryIndex % extensions.length;
        
        const nextSrc = nameVariants[variantIndex] + extensions[extIndex];
        
        img.onerror = function() {
          handleImageRetry(img, baseName, retryIndex + 1);
        };
        img.src = nextSrc;
      } else {
        // 모든 조합 매칭 실패 시 최종 대체 이니셜 카드 출력
        renderInitialsFallback(img);
      }
    }

    // 이니셜 대체 아바타 그리기
    function renderInitialsFallback(img) {
      const name = img.getAttribute('alt') || '동료';
      const firstLetter = name.charAt(0);
      const gradients = [
        'from-rose-400 to-pink-500',
        'from-amber-400 to-orange-500',
        'from-emerald-400 to-teal-500',
        'from-sky-400 to-indigo-500',
        'from-purple-400 to-fuchsia-500'
      ];
      
      const index = name.charCodeAt(0) % gradients.length;
      const gradient = gradients[index];

      const container = img.parentElement;
      const avatar = document.createElement('div');
      avatar.className = `w-16 h-16 rounded-full bg-gradient-to-br ${gradient} flex items-center justify-center text-white text-xl font-black shadow-md border-2 border-white ring-4 ring-rose-50/70 select-none shrink-0`;
      avatar.innerHTML = `<span>${firstLetter}</span>`;
      
      container.replaceChild(avatar, img);
    }

    // 2. 메시지 리스트 동적 렌더링
    function renderMessages() {
      const container = document.getElementById('messages-container');
      const noResults = document.getElementById('no-results');
      container.innerHTML = '';

      const filtered = messages.filter(item => {
        const matchesWeek = activeTab === 'all' ? true : item.week === activeTab;
        const matchesSearch = searchQuery === '' ? true : (
          item.targetName.includes(searchQuery) ||
          item.targetDept.includes(searchQuery) ||
          item.badge.includes(searchQuery) ||
          item.content.includes(searchQuery) ||
          item.tags.some(t => t.includes(searchQuery))
        );
        return matchesWeek && matchesSearch;
      });

      if (filtered.length === 0) {
        noResults.classList.remove('hidden');
        return;
      } else {
        noResults.classList.add('hidden');
      }

      filtered.forEach((item) => {
        const card = document.createElement('article');
        card.className = "bg-white rounded-3xl p-6 md:p-8 border border-slate-100 soft-shadow transition duration-300 hover:scale-[1.01] hover:border-amber-200/50 relative";
        
        const tagsHtml = item.tags.map(t => `<span class="px-2.5 py-1 bg-slate-100 text-slate-500 rounded-lg text-xs font-medium">#${t}</span>`).join(' ');

        card.innerHTML = `
          <!-- 주차 배지 -->
          <div class="flex justify-between items-center mb-4">
            <span class="inline-block text-[11px] font-bold bg-amber-500/10 text-amber-700 px-3 py-1 rounded-full border border-amber-200/30">
              ${item.week}주차 배달 (${item.date})
            </span>
            <div class="flex gap-2">${tagsHtml}</div>
          </div>

          <!-- 카드 메인 헤더 -->
          <h3 class="text-base md:text-lg font-bold text-slate-900 leading-snug mb-3 text-rose-600 flex items-start gap-1.5">
            <span>🎁</span>
            <span>"${item.badge}"</span>
          </h3>

          <!-- 감사 대상자 영역 (고해상도 최적화 카드 바 - 선명화 보정 적용) -->
          <div class="bg-amber-50/50 p-4 rounded-2xl flex flex-wrap justify-between items-center border border-amber-100/30 mb-4 gap-4">
            <div class="flex items-center gap-4">
              <!-- [화질 개선 핵심] premium-profile-img 클래스 적용 및 w-16 h-16 크기 고정화로 저해상도 보완 -->
              <img 
                src="${item.initialImg}" 
                alt="${item.targetName}" 
                data-basename="${item.baseName}"
                class="premium-profile-img w-16 h-16 rounded-full border-2 border-white shadow-md ring-4 ring-rose-50/70 shrink-0"
                onerror="handleImageRetry(this, '${item.baseName}', 0)"
              >
              <div>
                <span class="text-xs font-semibold text-slate-400 block">감사 대상자</span>
                <span class="text-sm font-bold text-slate-800">${item.targetDept} <span class="text-rose-500 text-base">${item.targetName}</span></span>
              </div>
            </div>
            <div class="text-right">
              <span class="text-xs font-semibold text-slate-400 block">전달 상태</span>
              <span class="text-xs font-bold text-emerald-600 flex items-center gap-1">🟢 안전하게 비공개 배달 완료</span>
            </div>
          </div>

          <!-- 편지 본문 -->
          <div class="text-slate-600 text-sm leading-relaxed border-l-4 border-amber-200 pl-4 py-1 my-5 italic bg-amber-50/10 rounded-r-xl pr-2">
            ${item.content}
          </div>

          <!-- 발신자 서명 -->
          <p class="text-right text-xs font-bold text-slate-400 mt-4 mb-2">
            — ${item.sender}
          </p>

          <hr class="border-slate-100/80 my-4">

          <!-- 소통 하트 버튼 -->
          <div class="flex justify-between items-center">
            <p class="text-xs text-slate-400 font-medium">이 편지가 감동적이셨다면 마음을 보태주세요!</p>
            <button onclick="handleLike(event, ${item.id})" class="flex items-center gap-1.5 bg-rose-50 hover:bg-rose-100 text-rose-500 active:scale-95 transition-all px-4 py-1.5 rounded-2xl font-bold text-xs relative">
              <span class="text-sm">❤️</span> 
              <span>따뜻해요</span> 
              <span class="bg-rose-500 text-white font-black rounded-full px-1.5 py-0.5 text-[9px] min-w-4 text-center" id="like-count-${item.id}">
                ${item.likes}
              </span>
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // 3. 필터링 컨트롤 기능
    function filterWeek(week) {
      activeTab = week;
      const tabs = ['all', 1, 2];
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        if (t === week) {
          btn.className = "flex-1 md:flex-none px-4 py-2 rounded-lg text-sm font-medium bg-white text-rose-600 shadow-sm";
        } else {
          btn.className = "flex-1 md:flex-none px-4 py-2 rounded-lg text-sm font-medium text-slate-500 hover:text-slate-800 transition-all duration-200";
        }
      });
      renderMessages();
    }

    // 4. 검색 필터링 핸들러
    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.trim();
      renderMessages();
    }

    // 5. 공감(좋아요) 처리 및 하트 이펙트 효과
    function handleLike(event, id) {
      const messageIndex = messages.findIndex(m => m.id === id);
      if (messageIndex === -1) return;

      messages[messageIndex].likes += 1;
      
      const savedLikes = {};
      messages.forEach(m => {
        savedLikes[m.id] = m.likes;
      });
      localStorage.setItem('daesung_thanks_campaign_likes', JSON.stringify(savedLikes));

      document.getElementById(`like-count-${id}`).innerText = messages[messageIndex].likes;
      createFloatingHeart(event);
    }

    function createFloatingHeart(event) {
      const btn = event.currentTarget;
      const rect = btn.getBoundingClientRect();
      const heart = document.createElement('div');
      
      heart.className = 'floating-heart text-lg';
      heart.innerText = ['❤️', '💖', '🥰', '🎈', '✨'][Math.floor(Math.random() * 5)];
      
      heart.style.left = `${rect.left + rect.width / 2 + window.scrollX - 10}px`;
      heart.style.top = `${rect.top + window.scrollY - 10}px`;
      
      document.body.appendChild(heart);
      
      setTimeout(() => {
        heart.remove();
      }, 800);
    }

    // 6. 초기 구동 트리거
    window.onload = function() {
      initData();
      renderMessages();
    }
  </script>
</body>
</html>
